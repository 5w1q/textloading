# 环境变量来自 ./deploy/textloading.env（生产可用 ln -s 指向 /etc/textloading/textloading.env）
#
# PostgreSQL：compose 内 postgres 默认不在宿主机映射端口，避免与「统一基建」宿主机 PostgreSQL（常见占用 :5432）冲突。
# 生产若 DATABASE_URL 指向 host.docker.internal（宿主库 textloading_app），此容器仅为闲置依赖时可日后用 profile 关掉；
# 仅用 compose 内库时，服务间仍通过主机名 postgres:5432 访问。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: douyin
      POSTGRES_PASSWORD: douyin
      POSTGRES_DB: textloading_app
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douyin -d textloading_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    env_file:
      - ./deploy/textloading.env
    ports:
      - "19190:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=4).read()",
        ]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 40s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./deploy/textloading.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -c
      - uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${UVICORN_WORKERS:-2}
    ports:
      - "18180:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).read()",
        ]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bridge:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./deploy/textloading.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq app.workers.settings.WorkerSettings
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bridge:
        condition: service_healthy

volumes:
  pg_data:
