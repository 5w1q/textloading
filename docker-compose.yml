services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: douyin
      POSTGRES_PASSWORD: douyin
      # 与 unified-infra-optimization-plan：库名 textloading_app（新建 volume 时生效）
      POSTGRES_DB: textloading_app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douyin -d textloading_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Evil0ctal 薄桥接：见 bridge/README.md；UPSTREAM 需指向本机已启动的上游（默认 19001）
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    ports:
      - "19000:9000"
    environment:
      # 默认单实例 Evil0ctal（宿主机 :19001）。需双 Cookie 轮询时再设置 UPSTREAM_BASE_URLS（见 bridge/README.md）
      UPSTREAM_BASE_URL: "http://host.docker.internal:19001"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${UVICORN_WORKERS:-2}
    environment:
      DATABASE_URL: postgresql+asyncpg://douyin:douyin@postgres:5432/textloading_app
      # unified-infra：Redis DB index 2 + key 前缀 tl:
      REDIS_URL: redis://redis:6379/2
      REDIS_KEY_PREFIX: "tl:"
      JWT_SECRET: change-me-in-production-use-long-random-string
      DOUYIN_ADAPTER: http
      DOUYIN_HTTP_RESOLVE_URL: http://bridge:9000/douyin/resolve?unique_id={unique_id}
      DOUYIN_HTTP_FEED_URL: http://bridge:9000/douyin/feed?sec_uid={sec_uid}&cursor={cursor}
      CORS_ORIGINS: https://hub.sayhi-ab.asia,http://localhost:5174,http://127.0.0.1:5174
      UVICORN_WORKERS: "2"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
      RATE_LIMIT_SYNC_PER_USER_PER_MINUTE: "30"
      DOUYIN_FETCH_MAX_CONCURRENT: "4"
    ports:
      - "18080:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bridge:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.workers.settings.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://douyin:douyin@postgres:5432/textloading_app
      REDIS_URL: redis://redis:6379/2
      REDIS_KEY_PREFIX: "tl:"
      JWT_SECRET: change-me-in-production-use-long-random-string
      DOUYIN_ADAPTER: http
      DOUYIN_HTTP_RESOLVE_URL: http://bridge:9000/douyin/resolve?unique_id={unique_id}
      DOUYIN_HTTP_FEED_URL: http://bridge:9000/douyin/feed?sec_uid={sec_uid}&cursor={cursor}
      DOUYIN_HTTP_MAX_ATTEMPTS: "5"
      DOUYIN_HTTP_RETRY_BACKOFF_BASE: "0.5"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "5"
      DOUYIN_FETCH_MAX_CONCURRENT: "4"
      WORKER_MAX_JOBS: "2"
      WORKER_JOB_TIMEOUT: "900"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bridge:
        condition: service_started

volumes:
  pg_data:
