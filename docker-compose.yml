# 环境变量来自 ./deploy/textloading.env（生产可用 ln -s 指向 /etc/textloading/textloading.env）
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: douyin
      POSTGRES_PASSWORD: douyin
      POSTGRES_DB: textloading_app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douyin -d textloading_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    env_file:
      - ./deploy/textloading.env
    ports:
      - "19190:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./deploy/textloading.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - sh
      - -c
      - uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${UVICORN_WORKERS:-2}
    ports:
      - "18180:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bridge:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./deploy/textloading.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: arq app.workers.settings.WorkerSettings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bridge:
        condition: service_started

volumes:
  pg_data:
