# 粘贴到 hub.sayhi-ab.asia 的 server { } 内，
# 且必须写在 「location / { try_files ... /index.html; }」 之前。
#
# 原因：前端默认请求同源路径 /auth/me、/tasks、/videos、/config/public（VITE_API_BASE 为空）。
# 若不反代到 FastAPI，Nginx 会把它们当成 SPA 路由并返回 index.html，
# 浏览器拿到 HTML 当 JSON 解析 → 路由守卫或页面逻辑异常 → 常见表现为首页白屏。
#
# 保存后执行：sudo nginx -t && sudo systemctl reload nginx

location ^~ /auth/ {
    proxy_pass http://127.0.0.1:18180;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /tasks {
    proxy_pass http://127.0.0.1:18180;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /videos {
    proxy_pass http://127.0.0.1:18180;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /config/ {
    proxy_pass http://127.0.0.1:18180;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# 可选：对外健康检查（若不希望暴露可删掉或限制 IP）
location = /health {
    proxy_pass http://127.0.0.1:18180/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
location = /ready {
    proxy_pass http://127.0.0.1:18180/ready;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
